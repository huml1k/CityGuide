<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityGuide - Вход</title>
    <link rel="stylesheet" href="../css/styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">

    <div class="max-w-md w-full mx-auto bg-white rounded-3xl shadow-lg p-8">
        <div class="text-center mb-8">
            <h1 onclick="window.location.href='../index.html'"
                class="text-4xl font-bold text-blue-600 cursor-pointer">CityGuide</h1>
            <p class="text-gray-600 mt-2">Войдите в аккаунт</p>
        </div>

        <p id="formError" class="hidden mb-4 p-3 rounded-xl bg-red-50 text-red-700 text-sm"></p>

        <form id="loginForm">
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                <input type="email" id="email"
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-blue-500"
                       placeholder="your@email.com" required>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Пароль</label>
                <input type="password" id="password"
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-blue-500"
                       placeholder="••••••••" required>
            </div>

            <button type="submit"
                    class="w-full bg-blue-600 text-white py-4 rounded-2xl font-semibold text-lg hover:bg-blue-700 transition">
                Войти
            </button>
        </form>

        <div class="text-center mt-6">
            <p class="text-gray-600">
                Нет аккаунта?
                <a href="register.html" class="text-blue-600 font-medium hover:underline">Зарегистрироваться</a>
            </p>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/pages/login.js"></script>
</body>
</html>
