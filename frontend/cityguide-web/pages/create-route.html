<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityGuide - Создать маршрут</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

    <!-- HEADER -->
    <header class="bg-blue-600 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 onclick="window.location.href='../index.html'" class="text-3xl font-bold cursor-pointer">CityGuide</h1>
            <a href="creator-profile.html" class="hover:underline">← В профиль Creator</a>
        </div>
    </header>

    <div class="max-w-4xl mx-auto px-6 py-10">
        <h1 class="text-4xl font-bold mb-2">Создать новый маршрут</h1>
        <p class="text-gray-600 mb-10">Заполните информацию о маршруте</p>

        <form id="createRouteForm" class="space-y-10">

            <!-- Название -->
            <div>
                <label class="block text-lg font-medium mb-2">Название маршрута</label>
                <input type="text" id="title" required
                       class="w-full px-5 py-4 border border-gray-300 rounded-2xl text-lg focus:outline-none focus:border-blue-500"
                       placeholder="Например: Исторический центр Москвы">
            </div>

            <!-- Описание -->
            <div>
                <label class="block text-lg font-medium mb-2">Описание маршрута</label>
                <textarea id="description" rows="5" required
                          class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500"
                          placeholder="Расскажите подробнее о маршруте..."></textarea>
            </div>

            <!-- Продолжительность -->
            <div>
                <label class="block text-lg font-medium mb-2">Продолжительность</label>
                <input type="text" id="duration" required
                       class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500"
                       placeholder="4 часа" value="4 часа">
            </div>

            <!-- Google Maps URL -->
            <div>
                <label class="block text-lg font-medium mb-2">Ссылка на карту (Google Maps)</label>
                <input type="url" id="mapUrl" required
                       class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500"
                       placeholder="https://maps.app.goo.gl/...">
            </div>

            <!-- Фото (1-6) -->
            <div>
                <label class="block text-lg font-medium mb-3">Фотографии маршрута (от 1 до 6)</label>
                <input type="file" id="photoInput" accept="image/*" multiple class="hidden">
                
                <div onclick="document.getElementById('photoInput').click()"
                     class="border-2 border-dashed border-gray-300 rounded-2xl p-10 text-center cursor-pointer hover:border-blue-400 transition">
                    <p class="text-4xl mb-3">📸</p>
                    <p class="font-medium">Нажмите, чтобы добавить фото</p>
                    <p class="text-sm text-gray-500">Максимум 6 фотографий</p>
                </div>

                <div id="photoPreview" class="grid grid-cols-3 gap-4 mt-6">
                    <!-- Превью фото -->
                </div>
            </div>

            <!-- Аудио файл -->
            <div>
                <label class="block text-lg font-medium mb-2">Аудио экскурсия</label>
                <input type="file" id="audioInput" accept="audio/*" class="block w-full text-sm text-gray-500 file:mr-4 file:py-3 file:px-6 file:rounded-xl file:border-0 file:bg-blue-600 file:text-white">
                <p class="text-sm text-gray-500 mt-2">Поддерживаются: mp3, wav, m4a</p>
            </div>

            <!-- Теги -->
            <div>
                <label class="block text-lg font-medium mb-3">Теги (максимум 3)</label>
                <div class="flex flex-wrap gap-3" id="tagsContainer">
                    <!-- Теги добавляются через JS -->
                </div>
            </div>

            <!-- Кнопка публикации -->
            <button type="submit"
                    class="w-full bg-green-600 hover:bg-green-700 text-white py-5 rounded-2xl text-xl font-semibold transition">
                Опубликовать маршрут
            </button>
        </form>
    </div>

    <script>
        let selectedPhotos = [];
        const maxPhotos = 6;
        let selectedTags = [];

        const availableTags = ["Пеший", "Природа", "Исторический", "Архитектура", "Гастрономия", 
                              "На авто", "Выходные", "Однодневный", "Семейный", "Ночной"];

        // Превью фото
        document.getElementById('photoInput').addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            
            files.forEach(file => {
                if (selectedPhotos.length >= maxPhotos) return;
                
                const reader = new FileReader();
                reader.onload = function(ev) {
                    selectedPhotos.push({
                        file: file,
                        preview: ev.target.result
                    });
                    renderPhotoPreviews();
                };
                reader.readAsDataURL(file);
            });
        });

        function renderPhotoPreviews() {
            const container = document.getElementById('photoPreview');
            container.innerHTML = '';

            selectedPhotos.forEach((photo, index) => {
                const div = document.createElement('div');
                div.className = "relative";
                div.innerHTML = `
                    <img src="${photo.preview}" class="w-full h-32 object-cover rounded-xl">
                    <button onclick="removePhoto(${index})" 
                            class="absolute top-2 right-2 bg-red-500 text-white w-6 h-6 rounded-full text-xs">✕</button>
                `;
                container.appendChild(div);
            });
        }

        function removePhoto(index) {
            selectedPhotos.splice(index, 1);
            renderPhotoPreviews();
        }

        // Теги
        function renderTags() {
            const container = document.getElementById('tagsContainer');
            container.innerHTML = '';

            availableTags.forEach(tag => {
                const isSelected = selectedTags.includes(tag);
                const btn = document.createElement('button');
                btn.className = `px-5 py-2 rounded-2xl text-sm font-medium transition ${isSelected ? 
                    'bg-blue-600 text-white' : 'bg-gray-200 hover:bg-gray-300'}`;
                btn.textContent = tag;
                btn.onclick = () => toggleTag(tag, btn);
                container.appendChild(btn);
            });
        }

        function toggleTag(tag, btn) {
            if (selectedTags.includes(tag)) {
                selectedTags = selectedTags.filter(t => t !== tag);
                btn.classList.remove('bg-blue-600', 'text-white');
                btn.classList.add('bg-gray-200');
            } else if (selectedTags.length < 3) {
                selectedTags.push(tag);
                btn.classList.add('bg-blue-600', 'text-white');
            } else {
                alert("Можно выбрать максимум 3 тега");
            }
        }

        // Отправка формы
        document.getElementById('createRouteForm').addEventListener('submit', function(e) {
            e.preventDefault();

            if (selectedPhotos.length === 0) {
                alert("Добавьте хотя бы одну фотографию!");
                return;
            }

            const formData = {
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                duration: document.getElementById('duration').value,
                mapUrl: document.getElementById('mapUrl').value,
                photosCount: selectedPhotos.length,
                tags: selectedTags,
                audioFile: document.getElementById('audioInput').files[0]?.name || "Не загружен"
            };

            console.log("Отправка на бэкенд:", formData);
            alert("✅ Маршрут успешно создан!\n(Демо-режим)");
            
            // Можно перенаправить в профиль Creator
            // window.location.href = 'creator-profile.html';
        });

        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            renderTags();
        });
    </script>
</body>
</html>
