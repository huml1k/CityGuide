<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityGuide - Модерация</title>
    <link rel="stylesheet" href="../css/styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

    <!-- HEADER -->
    <header class="bg-red-600 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 onclick="window.location.href='../index.html'" class="text-3xl font-bold cursor-pointer">CityGuide</h1>
            <div class="flex items-center gap-6">
                <span class="font-semibold">Панель администратора</span>
                <a href="../index.html" class="hover:underline">На главную</a>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-6 py-10">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-4xl font-bold">Модерация маршрутов</h1>
            <div class="text-gray-600">
                Ожидают проверки: <span id="pendingCount" class="font-semibold text-red-600">12</span>
            </div>
        </div>

        <!-- Контейнер карточек -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="moderationContainer">
            <!-- Карточки добавляются через JS -->
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/pages/admin-moderation.js"></script>
</body>
</html>
