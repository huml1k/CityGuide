<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityGuide - Детали маршрута</title>
    <link rel="stylesheet" href="../css/styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">

    <!-- HEADER -->
    <header class="bg-blue-600 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 onclick="window.location.href='../index.html'" 
                class="text-3xl font-bold cursor-pointer">CityGuide</h1>
            <nav id="mainNav" class="flex items-center gap-6"></nav>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-6 py-8">

        <p id="pageLoading" class="text-gray-500 mb-4">Загрузка маршрута...</p>

        <!-- Название маршрута -->
        <div class="flex justify-between items-start mb-6">
            <h1 id="routeTitle" class="text-4xl font-bold">Исторический центр Москвы</h1>
            <div class="flex items-center gap-2">
                <button onclick="toggleLike()" id="likeButton"
                        class="flex items-center gap-2 text-2xl hover:scale-110 transition">
                    ❤️ <span id="likesCount" class="text-2xl font-semibold">124</span>
                </button>
            </div>
        </div>

        <!-- Информация о маршруте -->
        <div class="flex flex-wrap gap-6 text-gray-600 mb-8">
            <div class="flex items-center gap-2">
                <span class="text-xl">⏱</span>
                <span id="duration" class="font-medium">4 часа</span>
            </div>
            <div class="flex items-center gap-2">
                <span>👤</span>
                <a href="#" id="creatorLink" class="text-blue-600 hover:underline">Автор</a>
            </div>
        </div>

        <!-- Теги -->
        <div class="flex gap-2 mb-8" id="tagsContainer">
            <!-- Теги добавляются через JS -->
        </div>

        <!-- Галерея фото -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-10" id="photoGallery">
            <!-- Фото добавляются через JS -->
        </div>

        <!-- Описание -->
        <div class="bg-white rounded-2xl p-8 mb-10 shadow-sm">
            <h2 class="text-2xl font-semibold mb-4">Описание маршрута</h2>
            <p id="description" class="text-gray-700 leading-relaxed text-lg">
            </p>
        </div>

        <!-- Аудио экскурсия -->
        <div id="audioSection" class="bg-white rounded-2xl p-8 mb-10 shadow-sm">
            <h2 class="text-2xl font-semibold mb-4">🎧 Аудио экскурсия</h2>
            <audio id="audioPlayer" controls class="w-full"></audio>
            <p id="audioInfo" class="text-sm text-gray-500 mt-2"></p>
        </div>

        <!-- Карта - твой маршрут -->
        <div class="bg-white rounded-2xl p-8 mb-10 shadow-sm">
            <h2 class="text-2xl font-semibold mb-4">Маршрут на карте</h2>

            <iframe id="mapFrame"
                width="100%"
                height="500"
                style="border:0; border-radius: 16px;"
                allowfullscreen=""
                loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"
                class="hidden">
            </iframe>
        </div>
        
    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/pages/route-detail.js"></script>
</body>
</html>
