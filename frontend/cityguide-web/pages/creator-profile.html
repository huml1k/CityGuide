<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityGuide - Профиль автора</title>
    <link rel="stylesheet" href="../css/styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50">

    <!-- HEADER -->
    <header class="bg-blue-600 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 onclick="window.location.href='../index.html'" class="text-3xl font-bold cursor-pointer">CityGuide</h1>
            <nav id="mainNav" class="flex items-center gap-6"></nav>
        </div>
    </header>

    <div class="max-w-5xl mx-auto px-6 py-10">
        <h1 class="text-4xl font-bold mb-8">Профиль автора</h1>

        <div class="bg-white rounded-3xl shadow p-8 mb-10">
            <div class="flex items-center gap-6 mb-8">
                <div
                    class="w-24 h-24 bg-gradient-to-br from-blue-500 to-purple-500 rounded-2xl flex items-center justify-center text-5xl text-white">
                    👩‍🎨
                </div>
                <div class="flex-1">
                    <label class="block text-sm text-gray-600 mb-1">Email</label>
                    <p id="userEmail" class="text-gray-700 mb-3"></p>
                </div>
            </div>

            <div class="flex flex-wrap gap-4 mb-4">
                <a href="create-route.html"
                    class="inline-block bg-green-600 text-white px-8 py-4 rounded-2xl font-semibold hover:bg-green-700 transition">
                    ➕ Создать новый маршрут
                </a>
            </div>
            <p id="saveStatus" class="hidden mb-4 text-sm"></p>
        </div>

        <!-- Мои маршруты -->
        <h2 class="text-2xl font-semibold mb-6">Мои маршруты</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="myRoutes">
            <!-- Заполняется через JS -->
        </div>

        <!-- Уведомления для Creator -->
        <div class="mt-12 bg-white rounded-3xl shadow p-8">
            <div class="flex justify-between items-center mb-6 flex-wrap gap-3">
                <h2 class="text-2xl font-semibold">🛎 Уведомления</h2>
                <button type="button" id="markAllReadBtn" onclick="markAllCreatorNotificationsRead()"
                    class="hidden px-4 py-2 border border-gray-300 rounded-xl hover:bg-gray-50 text-sm">
                    Прочитать все
                </button>
            </div>

            <div id="creatorNotifications" class="space-y-4">
                <!-- Уведомления добавляются через JS -->
            </div>

            <button id="loadMoreCreator" onclick="loadMoreCreatorNotifications()"
                class="mt-6 w-full py-3 border border-gray-300 rounded-2xl hover:bg-gray-50 hidden">
                Показать ещё
            </button>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/pages/creator-profile.js"></script>
</body>

</html>
